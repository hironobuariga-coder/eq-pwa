name: 道路通行止め収集（X/RSS方式・無料）

on:
  # 無料方式のため日中も含めて1時間ごとに収集可能
  # JST基準。GitHub ActionsはUTCなので -9時間。
  # 毎時 :10 に実行（GitHub高負荷の :00 を避ける）
  schedule:
    - cron: '10 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4.2.2

      - name: Node.js 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'

      # 依存パッケージ不要（fetch組込み・外部ライブラリなし）
      - name: 通行止め情報を収集
        run: node collect.js

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/road-log.json data/road-log-summary.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "road-log update"
            for i in 1 2 3; do
              git pull --rebase && git push && break
              echo "リトライ $i"
              sleep 5
            done
          fi
